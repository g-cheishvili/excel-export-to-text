name: Build & deploy to deploy_main

on:
  push:
    branches:
      - main

permissions:
  contents: write # required for the action to push to deploy_main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist to deploy_main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy_main
          force_orphan: true # keep deploy_main as a single clean commit
